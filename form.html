<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Formulario Registro</h1>
        <form>
            <label for="nombre">Nombre: </label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu Nombre" required>

            <label for="apellidos">Apellidos: </label>
            <input type="text" id="apellidos" name="apellidos" placeholder="Tus Apellidos" required>

            <label for="fechaNacimiento">Fecha de Nacimiento: </label>
            <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>

            <label for="email">Email: </label>
            <input type="email" id="email" name="email" placeholder="email@example.com" required>

            <label for="password">Password: </label>
            <input type="password" name="password" id="password" required>
            

            <label for="IBAN">Domiciliacion Bancaria</label>
            <div class="Domiciliacion">
                
                <input class="letras" type="text" name="IBAN" id="IBAN" placeholder="ESXX">
                <input class="numeros" type="number" name="numerosIBAN" id="numerosIBAN" placeholder="XXXX XXXX XXXX XXXX XXXX">
            </div>

            <label for="Sugerencias">Sugerencias</label>
            <textarea rows="4" placeholder="Escribenos tus Sugerencias" name="Sugerencias" id="Sugerencias"></textarea>

            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
</html>
